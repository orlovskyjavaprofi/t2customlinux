# --- libzmq.conf ---

# 1. Prevent the 'No such file or directory' race condition
# We force a serial build because libzmq's internal Makefile 
# dependencies for libzmq.la are often race-prone on high-core CPUs.
MAKE_JOBS=1

# 2. Optimization for Piledriver (bdver2)
# Ensure the compiler uses your specific architecture features
var_append confopt ' ' '--with-relaxed'

# 3. Disable drafting APIs if you want a stable, standard build
# This can sometimes reduce the complexity of the build graph
var_append confopt ' ' '--enable-drafts=no'

# 4. Explicitly set the library directory for 64-bit builds
var_append confopt ' ' "--libdir=/usr/lib64"

# 5. Optional: If you want to skip the heavy internal tests 
# that can also trigger race conditions during the build phase:
var_append confopt ' ' '--disable-perf'
var_append confopt ' ' '--disable-curve-tests'

# 6. Ensure we use the correct libtool (handling potential tag issues like bdb)
var_append makeopt ' ' 'LIBTOOL="/usr/bin/libtool --tag=CXX"'
