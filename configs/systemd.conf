hook_add postinst 5 "ln -sf /usr/lib/systemd/system/multi-user.target \$root/etc/systemd/system/default.target"

set_t2_pythonpath() {
    # Dynamically find the site-packages directory
    local site_packages=$(find $root/usr/lib64/python* -name "site-packages" | head -n 1)
    
    if [ -d "$site_packages" ]; then
        export PYTHONPATH="$site_packages:$PYTHONPATH"
        echo "--- [DEBUG] Auto-detected Python site-packages: $site_packages ---"
    else
        echo "--- [WARNING] No site-packages found in $root/usr/lib64/python* ---"
    fi
}
# Add this as a preconf hook
hook_add preconf 0 set_t2_pythonpath