var_remove confopt ' ' --enable-shared
var_remove confopt ' ' --disable-static
var_append confopt ' ' --disable-install-libbfd
var_append confopt ' ' --disable-sim

var_append CXXFLAGS ' ' '-Wno-error=maybe-uninitialized -Wno-deprecated-declarations'

MAKE_JOBS=1

pkg_gdb_fix_libtool() {
    mkdir -p "$builddir/_ltshim"
    cat > "$builddir/_ltshim/libtool" << 'EOF'
#!/bin/sh
exec /usr/bin/libtool --tag=CXX "$@"
EOF
    chmod +x "$builddir/_ltshim/libtool"
    export PATH="$builddir/_ltshim:$PATH"
}

hook_add preconf 3 pkg_gdb_fix_libtool
hook_add inmake 5 "eval $MAKE -C gdb/doc DESTDIR=$root install-info"
