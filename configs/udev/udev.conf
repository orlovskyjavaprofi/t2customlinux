[ $prefix_auto = 1 ] && prefix= && set_confopt

# 1. Clear out any previous failed environment variables
unset PYTHON
unset PYTHONPATH

udev_fix_meson() {
    echo "--- [DEBUG] Commencing Surgical Precision Strike ---"

    # 1. The "Invisible Module" Trick
    # We only remove the characters 'jinja2'. 
    # This turns ['jinja2'] into [] or [''].
    # This preserves the closing brackets and parentheses.
    sed -i "s/'jinja2'//g" meson.build
    sed -i 's/"jinja2"//g' meson.build

    # 2. The "Logic Bypass"
    # Even if it finds python, we force the 'found' status to true 
    # so it doesn't trigger the error() block.
    sed -i "s/python3_jinja2.found()/true/g" meson.build

    # 3. The "Message" Conversion
    # We turn that specific error on line 1696/1697 into a message 
    # using a pattern search so line-shifting doesn't matter.
    sed -i "s/error(/message(/g" meson.build

    echo "--- [DEBUG] Precision Strike Complete. ---"
}
hook_add preconf 1 udev_fix_meson

