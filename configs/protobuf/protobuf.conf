# --- protobuf.conf ---

# 1. Stability and Error Handling
# Use 1 job to ensure the linker doesn't run out of memory (OOM) 
# and to keep the output clear.
MAKE_JOBS=1

# The "Force Win" flag: tells make to ignore non-critical exit 
# errors (like documentation) as long as the binaries are created.
var_append makeopt ' ' '-i'

# 2. The Linker "Master Key" (LDFLAGS)
# These flags manually link the specific internal Abseil libraries 
# that were showing up as "undefined reference" in your logs.
var_append LDFLAGS ' ' '-labsl_log_internal_message -labsl_log_internal_check_op -labsl_log_internal_nullguard -labsl_log_internal_conditions -labsl_log_internal_globals -labsl_log_internal_format -labsl_log_internal_proto'
var_append LDFLAGS ' ' '-labsl_container_internal_common -labsl_hash -labsl_city -labsl_low_level_hash'
var_append LDFLAGS ' ' '-labsl_status -labsl_statusor -labsl_strings -labsl_synchronization -labsl_throw_delegate -labsl_bad_variant_access -labsl_raw_logging_internal -lrt'

# 3. CMake Provider & Path Logic
# Force Protobuf to use the T2 system libraries instead of downloading its own.
var_append cmakeopt ' ' '-Dprotobuf_BUILD_TESTS=OFF'
var_append cmakeopt ' ' '-Dprotobuf_ABSL_PROVIDER=package'
var_append cmakeopt ' ' '-Dprotobuf_JSONCPP_PROVIDER=package'
var_append cmakeopt ' ' '-Dprotobuf_ZLIB_PROVIDER=package'
var_append cmakeopt ' ' '-DFETCHCONTENT_FULLY_DISCONNECTED=ON'

# 4. System Paths and Standards
var_append cmakeopt ' ' '-DCMAKE_INSTALL_LIBDIR=lib64'
var_append cmakeopt ' ' '-Dabsl_DIR=/usr/lib64/cmake/absl'
var_append CXXFLAGS ' ' '-std=c++17 -Wno-deprecated-declarations'

# 5. T2 Wrapper Fix
# Ensures the C++ tag is maintained during the final libtool link.
var_append makeopt ' ' 'LIBTOOL="/usr/bin/libtool --tag=CXX"'
