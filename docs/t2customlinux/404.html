<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>404 - Custom T2 Linux Build</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #111827;
      color: #e5e7eb;
      text-align: center;
    }

    .container {
      max-width: 650px;
      padding: 40px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 120px;
      margin: 0;
      line-height: 1;
      color: #60a5fa;
      font-weight: 800;
    }

    h2 {
      font-size: 32px;
      margin: 20px 0;
    }

    p {
      color: #9ca3af;
      font-size: 18px;
      line-height: 1.6;
    }

    .buttons {
      margin-top: 30px;
    }

    a {
      display: inline-block;
      margin: 10px;
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .home {
      background: #2563eb;
      color: white;
    }

    .github {
      background: #374151;
      color: white;
    }

    a:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    footer {
      position: fixed;
      bottom: 20px;
      color: #6b7280;
      font-size: 14px;
    }

    .terminal {
      margin-top: 25px;
      background: #000;
      padding: 15px 25px;
      border-radius: 10px;
      font-family: monospace;
      color: #22c55e;
      display: inline-block;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    🐧
  </div>

  <h1>404</h1>

  <h2>Page not found</h2>

  <p>
    The requested page does not exist or may have been moved.
    The Custom T2 Linux Build system could not locate this resource.
  </p>

  <div class="terminal">
    $ error: package page not found
  </div>

  <div class="buttons">
    <a class="home" href="https://orlovskyjavaprofi.github.io/t2customlinux/">
      🏠 Home
    </a>

    <a class="github" href="https://github.com/orlovskyjavaprofi/t2customlinux">
      ⬡ GitHub
    </a>
  </div>

</div>

<footer>
  Custom T2 Linux Build · Orlovsky Consulting GbR
</footer>

</body>
</html>
